name: sketchify
description: Photo to sketch drawing assistant app built with Flutter and OpenCV
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  image_picker: ^1.0.7
  path_provider: ^2.1.2
  permission_handler: ^11.3.0
  image: ^4.1.3
  share_plus: ^7.2.2
  gal: any
  path: ^1.8.3
  firebase_core: ^3.1.0
  firebase_auth: ^5.1.0
  google_fonts: ^6.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
